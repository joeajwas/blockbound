<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockbound SMP - Status</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0033 100%);
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(26, 26, 61, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 15px 50px rgba(0, 255, 255, 0.2);
      text-align: center;
      border: 1px solid rgba(0, 255, 255, 0.25);
    }
    h1 {
      margin: 0 0 25px;
      font-size: 3em;
      color: #00ffff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    }
    #icon {
      width: 160px;
      height: 160px;
      border-radius: 16px;
      margin: 0 auto 30px;
      border: 4px solid #00ffff;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      background: #111;
      object-fit: cover;
    }
    .status {
      font-size: 3.5em;
      font-weight: bold;
      margin: 10px 0 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.9; }
    }
    .online { color: #00ff88; text-shadow: 0 0 25px #00ff88; }
    .offline { color: #ff4444; text-shadow: 0 0 30px #ff4444; animation-duration: 2s; }
    #details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 1.4em;
      margin: 20px 0;
    }
    #players-count {
      font-weight: bold;
      color: #00ffff;
    }
    #player-list {
      margin-top: 15px;
      font-size: 1.1em;
      color: #ccc;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 10px;
      min-height: 40px;
    }
    #motd {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 12px;
      margin: 25px 0;
      font-size: 1.3em;
      line-height: 1.5;
    }
    #discord-section {
      margin: 30px 0;
    }
    .discord-btn {
      display: inline-block;
      padding: 14px 32px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(88,101,242,0.5);
      transition: transform 0.2s;
    }
    .discord-btn:hover {
      transform: scale(1.05);
    }
    footer {
      margin-top: 40px;
      font-size: 1em;
      opacity: 0.85;
    }
    #server-addr {
      color: #00ffff;
      cursor: pointer;
      text-decoration: underline;
    }
    #last-update {
      margin-top: 25px;
      font-size: 0.95em;
      color: #aaaaff;
    }
    button {
      margin: 20px 10px;
      padding: 12px 24px;
      background: #00ffff;
      color: #000;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      transition: background 0.3s;
    }
    button:hover {
      background: #00cccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Blockbound SMP</h1>
    
    <img id="icon" src="https://via.placeholder.com/160?text=Loading..." alt="Server Icon"/>
    
    <div id="status" class="status">CHECKING...</div>
    
    <div id="details">
      <div id="players-count"></div>
      <div id="player-list"></div>
      <div id="version"></div>
    </div>
    
    <div id="motd"></div>
    
    <div id="discord-section">
      <p style="font-size: 1.2em; margin-bottom: 15px;">Join the Bengaluru crew for updates, whitelist, builds & chill!</p>
      <a href="https://discord.gg/YOUR_INVITE_CODE_HERE" target="_blank" class="discord-btn">Join Discord Now</a>
    </div>
    
    <footer>
      <span id="server-addr" onclick="navigator.clipboard.writeText('blockbound.mc-play.org'); alert('Copied!')">blockbound.mc-play.org</span>
       • Java + Bedrock (Geyser) • Bengaluru Low-Ping Vibes
    </footer>
    
    <div id="last-update">Last checked: just now</div>
    
    <button onclick="checkServer()">Refresh Status</button>
  </div>

  <script>
    const SERVER = "blockbound.mc-play.org";
    const STATUS_API = `https://api.mcsrvstat.us/2/${SERVER}`;

    const iconEl      = document.getElementById("icon");
    const statusEl    = document.getElementById("status");
    const playersCountEl = document.getElementById("players-count");
    const playerListEl   = document.getElementById("player-list");
    const versionEl   = document.getElementById("version");
    const motdEl      = document.getElementById("motd");
    const updateEl    = document.getElementById("last-update");

    async function checkServer() {
      try {
        const response = await fetch(STATUS_API);
        const data = await response.json();

        const now = new Date().toLocaleTimeString("en-IN", {timeZone: "Asia/Kolkata", hour12: false});
        updateEl.textContent = `Last checked: ${now} IST`;

        if (data.online) {
          statusEl.textContent = "ONLINE";
          statusEl.className = "status online";

          iconEl.src = data.icon || "https://via.placeholder.com/160/111133/00ffff?text=Blockbound";
          iconEl.alt = "Server Icon";

          const online = data.players.online;
          const max = data.players.max;
          playersCountEl.textContent = `${online}/${max} players online`;
          playersCountEl.style.color = online > 0 ? "#00ff88" : "#aaaaff";

          // Player list if available
          playerListEl.innerHTML = "";
          if (data.players.list && data.players.list.length > 0) {
            playerListEl.textContent = "Online: " + data.players.list.map(p => p.name).join(", ");
          } else {
            playerListEl.textContent = online > 0 ? "Players hidden (query not enabled?)" : "No one online yet – join us!";
          }

          versionEl.textContent = `Version: ${data.version || "Unknown"}`;

          motdEl.innerHTML = data.motd?.html || "Welcome to Blockbound SMP!";
        } else {
          statusEl.textContent = "OFFLINE";
          statusEl.className = "status offline";

          iconEl.src = "https://via.placeholder.com/160/000000/ff4444?text=Offline+🔧";
          iconEl.alt = "Offline";

          playersCountEl.textContent = "";
          playerListEl.textContent = "";
          versionEl.textContent = "";
          motdEl.innerHTML = "Server is currently in maintenance or offline.<br>Check Discord for updates!";
        }
      } catch (err) {
        statusEl.textContent = "ERROR";
        statusEl.className = "status offline";
        motdEl.textContent = "Couldn't fetch status 😢 Refresh or check connection.";
        console.error("Status check failed:", err);
      }
    }

    checkServer();
    setInterval(checkServer, 30000); // Every 30s
  </script>
</body>
</html>
