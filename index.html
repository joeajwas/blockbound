<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Embed - hmembeds</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #eee;
    }
    .container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background: #111;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .title {
      margin: 1.5rem 0 0.8rem;
      font-size: 1.4rem;
    }
    .info {
      color: #aaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <h1 class="title">Embedded Video Player</h1>

  <div class="container">
    <iframe 
      src="https://hmembeds.one/embed/f70e10ab9dea1cf5bfaff7d617c3141e" 
      width="640" 
      height="360" 
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media;"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <p class="info">
    This is a direct recreation of your embed using the original iframe.<br>
    Resize the browser window to see how it adapts (responsive).
  </p>

</body>
</html>
